server.port=8002
spring.application.name=cloud-resource-management
spring.main.allow-circular-references=true

# 时间格式配置
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8
spring.jackson.serialization.write-dates-as-timestamps=false

# 定时任务配置
# 监控任务执行频率（毫秒）
monitoring.task.rate=30000
# 每日费用生成时间（凌晨2点）
daily.billing.cron=0 0 2 * * ?
# 欠费停机检查频率（毫秒）
overdue.check.rate=60000
